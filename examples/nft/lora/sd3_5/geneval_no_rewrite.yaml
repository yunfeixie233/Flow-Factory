# DiffusionNFT on GenEval without prompt rewriting. This is the matched control
# for geneval.yaml: only the dataset path and run identity differ.
# Environment Configuration
launcher: "accelerate"  # Options: accelerate
config_file: config/deepspeed/deepspeed_zero2.yaml  # Path to distributed config file (optional)
num_processes: 8  # Number of processes to launch (overrides config file)
main_process_port: 29500
mixed_precision: "bf16"  # Options: no, fp16, bf16

# Data Configuration
data:
  datasets:
    - name: geneval  # Keep reward routing identical to the rewritten treatment
      dataset_dir: "${RUNTIME_ROOT}/data/geneval_knowledge_intrinsic_v0/no_rewrite"
      train:
        weight: 1
        max_dataset_size: null
      eval: {}
  preprocessing_batch_size: 32
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "${RUNTIME_ROOT}/cache/flow_factory/datasets"
  sampler_type: "auto"

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank : 32
  lora_alpha : 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  run_name: nft_geneval_no_rewrite
  project: "Flow-Factory"
  logging_backend: "wandb"
  save_dir: "${RUNTIME_ROOT}/runs"
  save_freq: 20
  save_model_only: false
  checkpoint_retention: 2

# Training Configuration
train:
  trainer_type: 'nft'
  advantage_aggregation: 'sum'
  nft_beta: 0.1
  off_policy: true
  ema_decay_schedule: "piecewise_linear"
  flat_steps: 0
  ramp_rate: 0.001
  ema_decay: 0.5
  ema_update_interval: 1
  ema_device: "cuda"
  num_train_timesteps: 4
  time_sampling_strategy: discrete
  time_shift: 3.0
  timestep_range: 0.5
  kl_type: 'v-based'
  kl_beta: 0
  ref_param_device: 'cuda'
  adv_clip_range: 5.0

  # Sampling Settings
  resolution: 512
  num_inference_steps: 10
  guidance_scale: 1.0

  # Batch and sampling
  per_device_batch_size: 16
  group_size: 16
  global_std: false
  unique_sample_num_per_epoch: 48
  gradient_step_per_epoch: 1
  gradient_accumulation_steps: auto

  # Optimization
  learning_rate: 3.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # Gradient Checkpointing
  enable_gradient_checkpointing: false

  # Seed
  seed: 42

# Scheduler Configuration
scheduler:
  dynamics_type: "ODE"

# Evaluation settings
eval:
  resolution: 512
  per_device_batch_size: 16
  guidance_scale: 1.0
  num_inference_steps: 40
  eval_freq: 20
  seed: 42

# Reward Model Configuration
rewards:
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 32
    device: "cuda"
    dtype: bfloat16

# Optional Evaluation Reward Models
eval_rewards:
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 32
    device: "cuda"
    dtype: bfloat16
