# AdvantageFlow paper-aligned DiffusionNFT multi-reward experiment.
# Source recipe: DiffusionNFT/config/af.py:nft_multi_reward in the prior
# AdvantageFlow checkout. The framework translation keeps the same SD3.5,
# Pick-a-Pic prompts, equal-weight reward sum, LoRA, batch geometry, optimizer,
# ODE step counts, reference regularization, EMA schedule, and cadence.
# AdvantageFlow paper-aligned DiffusionNFT multi-reward baseline + privileged-prompt
# distillation (PPD) auxiliary arm. Identical to pickapic_multi_reward.yaml except for
# run identity and the ppd block: rollouts and all three rewards stay on the original
# prompt; the balanced_v0 rewrite enters only through the rho-weighted same-state
# distillation loss. Matched control: pickapic_multi_reward_ppd_control.yaml (rho: 0.0).
# Records staging: scripts/prepare_ppd_records.sh (after the runtime preparer).

launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "fp16"

data:
  datasets:
    - name: pickapic
      # The prior AdvantageFlow split has 25,432 train and 2,048 test prompts.
      # The preparer copies it from PICKAPIC_DATASET_SOURCE to this SSD path.
      dataset_dir: "${RUNTIME_ROOT}/data/${PICKAPIC_DATASET_NAME}"
      train:
        weight: 1
        max_dataset_size: null
      eval: {}
  preprocessing_batch_size: 8
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "${RUNTIME_ROOT}/cache/flow_factory/datasets"
  sampler_type: "group_contiguous"

model:
  finetune_type: "lora"
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  run_name: "nft_pickapic_pickscore_hpsv21_clipscore_ppd_aux"
  project: "Flow-Factory"
  logging_backend: "wandb"
  save_dir: "${RUNTIME_ROOT}/runs"
  save_freq: 100
  save_model_only: false

train:
  trainer_type: "nft"
  # The reference launcher uses num_epochs=1001 (epochs 0..1000).
  max_epochs: 1001
  advantage_aggregation: "sum"
  nft_beta: 1.0

  # Match the old-policy update return_decay(step, decay_type=1).
  off_policy: true
  ema_decay_schedule: "piecewise_linear"
  flat_steps: 0
  ramp_rate: 0.001
  ema_decay: 0.5
  ema_update_interval: 1
  ema_device: "cuda"

  # Old recipe: int(10 * timestep_fraction=0.99) = 9 training timesteps.
  num_train_timesteps: 0
  time_sampling_strategy: "discrete"
  time_shift: 3.0
  timestep_range: 0.99

  kl_type: "v-based"
  kl_beta: 0.001
  ref_param_device: "cuda"
  adv_clip_range: 5.0

  resolution: 512
  num_inference_steps: 10
  guidance_scale: 1.0

  # 32 prompts * 4 images = 128 rollouts. Flow-Factory shares the sampling
  # and optimization microbatch, so 8/GPU gives two batches and auto GAS=2
  # before the nine-timestep multiplier: the same 128-sample optimizer batch.
  per_device_batch_size: 8
  group_size: 4
  unique_sample_num_per_epoch: 32
  gradient_step_per_epoch: 1
  gradient_accumulation_steps: "auto"
  num_inner_epochs: 1
  global_std: true
  latent_storage_dtype: "fp16"

  learning_rate: 3.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  enable_gradient_checkpointing: false
  seed: 42

# Privileged-prompt distillation. The AdvantageFlow three-reward calibration
# uses rho=0.006; the teacher is the lagged EMA sampling policy evaluated at
# the NFT training states under both conditionings.
ppd:
  enabled: true
  records_path: "${RUNTIME_ROOT}/data/pickapic_balanced_v0_pairs/records.jsonl"
  rho: 0.006
  kappa: 1.0
  timestep_weighted: true
  mask_identity: true
  require_records_coverage: true

scheduler:
  dynamics_type: "ODE"

eval:
  resolution: 512
  per_device_batch_size: 16
  guidance_scale: 1.0
  num_inference_steps: 40
  eval_freq: 50
  seed: 42

rewards:
  - name: "pickscore"
    reward_model: "PickScore"
    weight: 1.0
    batch_size: 16
    device: "cuda"
    dtype: "bfloat16"
  - name: "hpsv21"
    reward_model: "hpsv2"
    weight: 1.0
    batch_size: 16
    device: "cuda"
    dtype: "float32"
    hps_version: "v2.1"
    checkpoint_path: "${HPSV2_CHECKPOINT}"
  - name: "clipscore"
    reward_model: "clip"
    weight: 1.0
    batch_size: 16
    device: "cuda"
    dtype: "bfloat16"
    model_name_or_path: "openai/clip-vit-large-patch14"

eval_rewards:
  - name: "pickscore"
    reward_model: "PickScore"
    batch_size: 16
    device: "cuda"
    dtype: "bfloat16"
  - name: "hpsv21"
    reward_model: "hpsv2"
    batch_size: 16
    device: "cuda"
    dtype: "float32"
    hps_version: "v2.1"
    checkpoint_path: "${HPSV2_CHECKPOINT}"
  - name: "clipscore"
    reward_model: "clip"
    batch_size: 16
    device: "cuda"
    dtype: "bfloat16"
    model_name_or_path: "openai/clip-vit-large-patch14"
