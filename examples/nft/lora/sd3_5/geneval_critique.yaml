# DiffusionNFT + paired T2I critique on GenEval (SD3.5-M, LoRA, CFG-free).
#
# Round 1 renders each prompt and scores it with GenEval; a VLM critic rewrites
# the prompt (geneval_rewrite_antihal recipe — the winning arm of the critique
# prompt ablation); round 2 renders the rewrite from the SAME initial noise and
# is re-scored against the ORIGINAL prompt. DiffusionNFT adds the auxiliary
# direction term `critique_loss_weight * A_crit * sigma_t^2 * ||v - sg[v']||^2`
# on top of its unchanged native loss. See guidance/algorithms.md
# ("Optional T2I Critique Refinement").
#
# Requires the critique API key in the environment (here: OPENROUTER_KEY).

# Environment Configuration
launcher: "accelerate"  # Options: accelerate
config_file: config/deepspeed/deepspeed_zero2.yaml  # Path to distributed config file (optional)
num_processes: 8  # Number of processes to launch (overrides config file)
main_process_port: 29500
mixed_precision: "bf16"  # Options: no, fp16, bf16

# Data Configuration
data:
  datasets:
    - name: default  # Unique identifier (used in metrics, caching, reward routing)
      dataset_dir: "dataset/geneval"  # Folder with train.jsonl / test.jsonl
      train:  # Training participation config
        weight: 1  # Mixing weight (integer); ratio with other sources determines batch allocation
      eval: {}  # Eval participation (inherits shared `eval:` section settings)
  preprocessing_batch_size: 32  # Batch size for preprocessing
  dataloader_num_workers: 16  # Number of workers for DataLoader
  force_reprocess: false  # Force reprocessing of the dataset
  cache_dir: "~/.cache/flow_factory/datasets" # Cache directory for preprocessed datasets
  sampler_type: "auto"  # Options: auto, distributed_k_repeat, group_contiguous

# Model Configuration
model:
  finetune_type: 'lora' # Options: full, lora
  lora_rank : 32
  lora_alpha : 64
  target_modules: "default" # Options: all, default, or list of module names like ["to_k", "to_q", "to_v", "to_out.0"]
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null # Local path or HF repo id (e.g. 'owner/repo[/subdir][@rev]') for previous checkpoint/lora adapter
  resume_type: null # Options: lora, full, state. Null to auto-detect based on `finetune_type`

log:
  run_name: null  # Run name (auto: {model_type}_{finetune_type}_{timestamp})
  project: "Flow-Factory"  # Project name for logging
  logging_backend: "wandb"  # Options: wandb, swanlab, none
  save_dir: "saves/"  # Directory to save model checkpoints and logs
  save_freq: 10  # Save frequency in epochs (0 to disable). Paired runs benefit from a short cadence for early-collapse forensics.
  save_model_only: true  # Save only the model weights (not optimizer, scheduler, etc.)

# Training Configuration
train:
  # Trainer settings
  trainer_type: 'nft'
  advantage_aggregation: 'sum' # Options: 'sum', 'gdpo'
  nft_beta: 1.0
  critique_loss_weight: 0.1 # Lambda of the auxiliary critique direction term
  # `Old` Policy settings
  off_policy: true # Whether to use ema parameters for sampling off-policy data.
  ema_decay_schedule: "piecewise_linear"  # Decay schedule for EMA. Options: ['constant', 'power', 'linear', 'piecewise_linear', 'cosine', 'warmup_cosine']
  flat_steps: 0
  ramp_rate: 0.001
  ema_decay: 0.5  # EMA decay rate (0 to disable)
  ema_update_interval: 1  # EMA update interval (in epochs)
  ema_device: "cuda"  # Device to store EMA model (options: cpu, cuda)
  # Training Timestep distribution
  num_train_timesteps: 4 # Set null to all steps
  time_sampling_strategy: discrete # Options: uniform, logit_normal, discrete, discrete_with_init, discrete_wo_init
  time_shift: 3.0
  timestep_range: 0.5 # Select fraction of timesteps to train on
  # KL div
  kl_type: 'v-based'
  kl_beta: 1.0e-4 # KL divergence beta, 0 to disable
  ref_param_device: 'cuda' # Options: cpu, cuda
  # Clipping
  adv_clip_range: 5.0  # Advantage clipping range

  # Sampling Settings
  resolution: 512  # Can be int or [height, width]
  num_inference_steps: 10  # Number of timesteps
  guidance_scale: 1.0  # Guidance scale for sampling (CFG-free)

  # Batch and sampling
  per_device_batch_size: 8  # Batch size per device. Note: paired critique doubles the per-epoch render count.
  group_size: 24  # Group size for group-relative advantages
  global_std: true  # Use global std for advantage normalization
  unique_sample_num_per_epoch: 48  # Unique prompts per epoch (48 x 24 = 1152 rows/epoch)
  gradient_step_per_epoch: 1  # Gradient steps per epoch
  gradient_accumulation_steps: auto  # Options: auto, or positive integer. When set, `gradient_step_per_epoch` is ignored.

  # Optimization
  learning_rate: 3.0e-4  # Initial learning rate
  adam_weight_decay: 1.0e-4  # AdamW weight decay
  adam_betas: [0.9, 0.999]  # AdamW betas
  adam_epsilon: 1.0e-8  # AdamW epsilon
  max_grad_norm: 1.0  # Max gradient norm for clipping

  # Gradient Checkpointing
  enable_gradient_checkpointing: false  # Enable gradient checkpointing to save memory with extra compute

  # Seed
  seed: 42 # Random seed

# Scheduler Configuration
scheduler:
  dynamics_type: "ODE"  # Options: Flow-SDE, Dance-SDE, CPS, ODE

# Paired T2I critique (the point of this example).
critique:
  enabled: true
  backend: "openai-compatible" # Or a custom 'module.path:ClassName'
  model: "google/gemini-2.5-flash"
  base_url: "https://openrouter.ai/api/v1" # Any OpenAI-compatible endpoint
  api_key_env: "OPENROUTER_KEY" # Key is read from the environment; never stored in config
  mode: "geneval_rewrite_antihal" # Options: geneval_rewrite, geneval_rewrite_antihal, geneval_rewrite_nocosmetic, detail_rewrite
  prompts_yaml: null # Optional hot-reloaded prompt-recipe overlay (recipes.<name>.{system, user_builder})
  reward_name: "geneval" # Reward that defines the round-2 improvement
  validator: "geneval" # Deterministic semantic guard; rejected rewrites get zero critique advantage
  advantage_mode: "nonnegative" # Options: nonnegative (safe default), signed
  advantage_clip_range: [-1.0, 1.0] # Lower bound is raised to 0 in nonnegative mode
  num_workers: 16 # Concurrent critique API rows per rank
  max_tokens: 128 # Raise to >= 1024 if reasoning_effort is set to 'low' or higher (thinking shares the output budget)
  reasoning_effort: "none" # Options: none, low, ... ('low' improves rewrite quality at ~3x latency)
  image_format: "jpeg"

# Evaluation settings
eval:
  resolution: 512  # Evaluation resolution
  per_device_batch_size: 8  # Eval batch size
  guidance_scale: 1.0  # Guidance scale for sampling
  num_inference_steps: 40  # Number of eval timesteps
  eval_freq: 10  # Eval frequency in epochs (0 to disable)
  seed: 42  # Eval seed (defaults to training seed)

# Reward Model Configuration
# GenEval uses Mask2Former (mmdet 3.x) + CLIP for compositional evaluation.
# Returns continuous reward in [0, 1] based on object count/color/position accuracy.
rewards:
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 32
    device: "cuda"
    dtype: bfloat16

# Optional Evaluation Reward Models
eval_rewards:
  - name: "geneval"
    reward_model: "geneval"
    batch_size: 32
    device: "cuda"
    dtype: bfloat16
