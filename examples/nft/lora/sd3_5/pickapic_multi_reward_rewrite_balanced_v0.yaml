# Controlled variant of pickapic_multi_reward.yaml. It generates from the
# balanced-v0 rewritten prompt but scores PickScore, HPSv2.1, and CLIPScore
# against the row-aligned original Pick-a-Pic prompt.

launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "fp16"

data:
  datasets:
    - name: pickapic
      dataset_dir: "${RUNTIME_ROOT}/data/${PICKAPIC_REWRITE_DATASET_NAME}"
      train:
        weight: 1
        max_dataset_size: null
      eval: {}
  preprocessing_batch_size: 8
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "${RUNTIME_ROOT}/cache/flow_factory/datasets"
  sampler_type: "group_contiguous"

model:
  finetune_type: "lora"
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  run_name: "nft_pickapic_balanced_v0_pickscore_hpsv21_clipscore"
  project: "Flow-Factory"
  logging_backend: "wandb"
  save_dir: "${RUNTIME_ROOT}/runs"
  save_freq: 100
  save_model_only: false

train:
  trainer_type: "nft"
  max_epochs: 1001
  advantage_aggregation: "sum"
  nft_beta: 1.0

  off_policy: true
  ema_decay_schedule: "piecewise_linear"
  flat_steps: 0
  ramp_rate: 0.001
  ema_decay: 0.5
  ema_update_interval: 1
  ema_device: "cuda"

  num_train_timesteps: 0
  time_sampling_strategy: "discrete"
  time_shift: 3.0
  timestep_range: 0.99

  kl_type: "v-based"
  kl_beta: 0.001
  ref_param_device: "cuda"
  adv_clip_range: 5.0

  resolution: 512
  num_inference_steps: 10
  guidance_scale: 1.0

  per_device_batch_size: 8
  group_size: 4
  unique_sample_num_per_epoch: 32
  gradient_step_per_epoch: 1
  gradient_accumulation_steps: "auto"
  num_inner_epochs: 1
  global_std: true
  latent_storage_dtype: "fp16"

  learning_rate: 3.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  enable_gradient_checkpointing: false
  seed: 42

scheduler:
  dynamics_type: "ODE"

eval:
  resolution: 512
  per_device_batch_size: 16
  guidance_scale: 1.0
  num_inference_steps: 40
  eval_freq: 50
  seed: 42

rewards:
  - name: "pickscore"
    reward_model: "PickScore"
    weight: 1.0
    batch_size: 16
    device: "cuda"
    dtype: "bfloat16"
  - name: "hpsv21"
    reward_model: "hpsv2"
    weight: 1.0
    batch_size: 16
    device: "cuda"
    dtype: "float32"
    hps_version: "v2.1"
    checkpoint_path: "${HPSV2_CHECKPOINT}"
  - name: "clipscore"
    reward_model: "clip"
    weight: 1.0
    batch_size: 16
    device: "cuda"
    dtype: "bfloat16"
    model_name_or_path: "openai/clip-vit-large-patch14"

eval_rewards:
  - name: "pickscore"
    reward_model: "PickScore"
    batch_size: 16
    device: "cuda"
    dtype: "bfloat16"
  - name: "hpsv21"
    reward_model: "hpsv2"
    batch_size: 16
    device: "cuda"
    dtype: "float32"
    hps_version: "v2.1"
    checkpoint_path: "${HPSV2_CHECKPOINT}"
  - name: "clipscore"
    reward_model: "clip"
    batch_size: 16
    device: "cuda"
    dtype: "bfloat16"
    model_name_or_path: "openai/clip-vit-large-patch14"
